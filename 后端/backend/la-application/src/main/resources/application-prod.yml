# 生产环境配置
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:learning_assistant}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: -1ms

# 文件上传配置
upload:
  base-path: ${UPLOAD_BASE_PATH:/data/uploads}
  avatar-dir: ${UPLOAD_BASE_PATH:/data/uploads}/avatar
  resource-dir: ${UPLOAD_BASE_PATH:/data/uploads}/resources

# JWT密钥
jwt:
  secret: ${JWT_SECRET:your-production-secret-key-change-in-production}

# 日志配置
logging:
  level:
    com.learning: INFO
    org.springframework: WARN
  file:
    name: /var/log/learning-assistant/application.log
    max-size: 100MB
    max-history: 30
